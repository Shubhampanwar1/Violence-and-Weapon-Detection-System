<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel AI - Surveillance Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">

        <nav class="navbar">
            <div class="brand-logo">
                <h1>Sentinel AI</h1>
                <span class="status-indicator"></span>
                <p>System Active</p>
            </div>
            
            <div class="camera-controls">
                <label for="camera-source">Source:</label>
                <select id="camera-source">
                    <option value="webcam">Laptop WebCam</option>
                    <option value="usb">USB Camera 1</option>
                    <option value="rtsp">CCTV (RTSP Stream)</option>
                </select>
            </div>
        </nav>

        <main class="main-content">
            
            <section class="video-section">
                <h2>Live Vision Panel</h2>
                <div class="video-frame">
                    <img id="live-camera" src="placeholder.jpg" alt="Live Camera Feed">
                    <div class="overlay-stats">
                        <!-- <p>FPS: <span id="fps-counter">30</span></p>
                        <p>Latency: <span id="latency-counter">12ms</span></p> -->
                    </div>
                </div>
            </section>

            <section class="data-section">
                
                <div class="card modules-card">
                    <h3>Active Deep Learning Modules</h3>
                    <ul>
                        <li>🟢 YOLOv8 (Weapon Detection)</li>
                        <li>🟢 MediaPipe (Pose Estimation)</li>
                    </ul>
                </div>

                <div class="card alert-log-card">
                    <h3>Real-Time Alert Log</h3>
                    <div class="log-container" id="alert-logs">
                        <div class="alert-item threat-weapon">
                            <span class="timestamp">[14:32:05]</span>
                            <span class="threat-type">Handgun Detected</span>
                            <span class="confidence">88%</span>
                        </div>
                        <div class="alert-item threat-violence">
                            <span class="timestamp">[14:28:10]</span>
                            <span class="threat-type">Aggressive Motion</span>
                            <span class="confidence">92%</span>
                        </div>
                    </div>
                </div>

            </section>
        </main>
    </div>
</body>
</html>
