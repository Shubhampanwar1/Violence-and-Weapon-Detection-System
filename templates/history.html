<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel AI - Evidence Locker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px 0;
        }
        .evidence-card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            overflow: hidden;
        }
        .evidence-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 2px solid #ef4444;
        }
        .evidence-info {
            padding: 15px;
        }
        .evidence-info h4 { color: #f8fafc; margin-bottom: 5px; }
        .evidence-info p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 3px; }
        .btn-back {
            background-color: #3b82f6; color: white;
            padding: 10px 15px; text-decoration: none;
            border-radius: 4px; font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <nav class="navbar">
            <div class="brand-logo">
                <h1>Evidence Locker</h1>
                <p>Top 50 Most Recent Threats</p>
            </div>
            <div>
                <a href="/" class="btn-back">← Back to Live Camera</a>
            </div>
        </nav>

        <main>
            <div class="grid-container" id="evidence-grid">
                </div>
        </main>
    </div>

    <script>
        fetch('/api/history')
            .then(response => response.json())
            .then(data => {
                const grid = document.getElementById('evidence-grid');
                if (data.length === 0) {
                    grid.innerHTML = '<p style="color: gray;">No evidence recorded yet.</p>';
                } else {
                    data.forEach(alert => {
                        const card = `
                            <div class="evidence-card">
                                <img src="/static/evidence/${alert.image_path}" alt="Threat Image">
                                <div class="evidence-info">
                                    <h4>🚨 ${alert.threat_type}</h4>
                                    <p><strong>Time:</strong> ${alert.timestamp}</p>
                                    <p><strong>Surety/Confidence:</strong> ${alert.confidence}</p>
                                </div>
                            </div>
                        `;
                        grid.innerHTML += card;
                    });
                }
            })
            .catch(error => console.error('Error fetching history:', error));
    </script>
</body>
</html>
